name: Build and Publish Custom Bahmni Web

on:
  push:
    branches:
      - master   # Change to 'main' if needed
  workflow_dispatch:

jobs:
  build-publish-docker:
    name: Build & Publish Custom Docker Image
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- NODE SETUP ---
      - name: Use Node.js 14.x
        uses: actions/setup-node@v3
        with:
          node-version: 14.x

      # --- INSTALL GLOBAL TOOLS ---
      - name: Install global dependencies
        run: |
          npm install -g bower grunt-cli yarn

      # --- BUILD FRONTEND ---
      - name: Install dependencies and build UI
        run: |
          set -euxo pipefail

          # Build micro-frontends if present
          if [ -d "micro-frontends" ]; then
            cd micro-frontends
            yarn install
            yarn build
            cd ..
          fi

          # Build main UI
          cd ui
          yarn install
          yarn cache clean

          # 🔴 FIX: Convert CRLF → LF for all shell scripts
          find . -type f -name "*.sh" -exec sed -i 's/\r$//' {} +

          # Run packaging script
          /bin/bash ./scripts/package.sh

      # --- DOCKER SETUP ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # --- DOCKER LOGIN ---
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- BUILD & PUSH IMAGE ---
      - name: Docker Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: package/docker/Dockerfile
          push: true
          tags: |
            prashantaacharya/bahmni-web-custom:latest
            prashantaacharya/bahmni-web-custom:${{ github.sha }}
name: Build and Publish Custom Bahmni Web

on:
  push:
    branches:
      - master  # Change this to 'main' if your branch is named main
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  build-publish-docker:
    name: Build & Publish Custom Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Use Node.js 14.x
        uses: actions/setup-node@v3
        with:
          node-version: 14.x

      # --- 1. BUILD THE FRONTEND (The Yarn Build part) ---
      - name: Install dependencies and build UI
        run: |
          npm install -g bower grunt-cli
          # If your repo has a micro-frontends folder
          if [ -d "micro-frontends" ]; then
            cd micro-frontends && yarn install && yarn build && cd ..
          fi
          # Build the main UI
          cd ui && yarn install && yarn cache clean
          /bin/bash ./scripts/package.sh

      # --- 2. SET UP DOCKER ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2 
        with:
          # Use YOUR secrets here
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 3. BUILD AND PUSH THE IMAGE ---
      - name: Docker Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          # Use the Dockerfile provided in the repo
          file: package/docker/Dockerfile 
          push: true
          # REPLACE 'your-username' with your actual Docker Hub username
          tags: |
            prashantaacharya/bahmni-web-custom:latest
            prashantaacharya/bahmni-web-custom:${{ github.sha }}